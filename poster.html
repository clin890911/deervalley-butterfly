<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>蝶影 · 2026 紫斑蝶攝影競賽｜A4 海報 — 鹿芝谷</title>
<meta name="description" content="鹿芝谷 2026 紫斑蝶攝影競賽「蝶影」A4 活動海報。即日起至 8/31，金獎 NT$5,000，免費參與，掃碼上傳作品。" />
<meta property="og:type" content="website" />
<meta property="og:title" content="蝶影 · 2026 紫斑蝶攝影競賽｜A4 海報 — 鹿芝谷" />
<meta property="og:description" content="即日起至 8/31，拍下你眼中的紫色風景。金獎 NT$5,000，免費參與。" />
<meta property="og:image" content="https://clin890911.github.io/deervalley-butterfly/assets/og.jpg" />
<meta property="og:url" content="https://clin890911.github.io/deervalley-butterfly/poster.html" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #f3eee2;
    --gold: #cdaa62;
    --deep: #0d120c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif;
    color: var(--cream); background: #0a0d09; -webkit-text-size-adjust: 100%;
    min-height: 100vh; display: grid; place-items: center; padding: 2.2vmin;
  }

  /* ===== A4 版面 ===== */
  .sheet {
    position: relative; overflow: hidden;
    aspect-ratio: 210 / 297;
    width: min(96vw, calc((100vh - 4.4vmin) * 210 / 297));
    container-type: inline-size;
    /* 底圖裁切到右側無文字區（飛舞蝴蝶＋雲＋樹叢），避開中央燒死的標題與日期 */
    background: var(--deep) url("assets/banner.webp") no-repeat;
    background-size: 280%;
    background-position: 100% 32%;
    box-shadow: 0 18px 70px rgba(0,0,0,.55);
  }

  /* 上緣微暗托住標題，中段透出蝴蝶，下半部漸深放內容 */
  .scrim {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg,
        rgba(13,18,12,.58) 0%,
        rgba(13,18,12,.34) 15%,
        rgba(13,18,12,.20) 30%,
        rgba(13,18,12,.34) 45%,
        rgba(12,16,11,.70) 57%,
        rgba(10,14,9,.92) 72%,
        rgba(9,12,8,.98) 100%);
  }

  /* 內容：底部錨定 */
  .content {
    position: relative; z-index: 2; height: 100%;
    padding: 9cqw 11cqw 9cqw;
    display: flex; flex-direction: column; justify-content: flex-end;
  }

  /* — 主標區 — */
  .head { text-align: center; }
  .kicker { font-size: 2.5cqw; letter-spacing: 1cqw; font-weight: 500; color: var(--gold); }
  .title {
    margin: 2.6cqw 0 0; font-family: "Noto Serif TC", serif; font-weight: 900;
    font-size: 15cqw; line-height: 1; letter-spacing: 2.4cqw; color: #f8f3e8;
    text-shadow: 0 0.4cqw 3.4cqw rgba(0,0,0,.5);
  }
  .sub {
    margin: 2.6cqw 0 0; font-family: "Noto Serif TC", serif; font-weight: 500;
    font-size: 5.2cqw; letter-spacing: 2.2cqw; color: #efe9dc;
    text-shadow: 0 0.3cqw 2.4cqw rgba(0,0,0,.5);
  }
  .rule { width: 11cqw; height: 1px; margin: 4cqw auto; background: rgba(205,170,98,.75); }
  .tag { font-family: "Noto Serif TC", serif; font-weight: 300; font-size: 3.2cqw; letter-spacing: .7cqw; color: rgba(243,238,226,.85); text-shadow: 0 0.2cqw 2cqw rgba(0,0,0,.5); }
  .meta { margin-top: 2.8cqw; font-family: "Noto Serif TC", serif; font-size: 3.5cqw; font-weight: 500; letter-spacing: .5cqw; color: #f3eee2; }
  .meta .dot { color: var(--gold); margin: 0 1.8cqw; font-weight: 400; }

  /* — 獎項 — */
  .prizes { margin-top: 6cqw; }
  .prize { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 3cqw;
    padding: 2.3cqw 0; border-top: 1px solid rgba(243,238,226,.14); }
  .prize:last-child { border-bottom: 1px solid rgba(243,238,226,.14); }
  .prize .nm { font-family: "Noto Serif TC", serif; font-weight: 500; font-size: 4.3cqw; letter-spacing: .8cqw; color: #f3eee2; }
  .prize .nm i { font-style: normal; font-weight: 300; font-size: 2.5cqw; letter-spacing: .3cqw; color: rgba(243,238,226,.55); margin-left: 1.8cqw; }
  .prize .am { font-family: "Noto Serif TC", serif; font-weight: 600; font-size: 4.4cqw; letter-spacing: .3cqw; color: var(--gold); white-space: nowrap; }

  /* — 報名 — */
  .enter { margin-top: 6cqw; display: flex; align-items: center; gap: 5cqw; }
  .enter .qbox { flex: 0 0 auto; width: 20cqw; height: 20cqw; background: #f3eee2; border-radius: 1cqw; padding: 1.4cqw; }
  .enter .qbox img { width: 100%; height: 100%; display: block; }
  .enter .et { font-family: "Noto Serif TC", serif; font-weight: 600; font-size: 4.2cqw; letter-spacing: 1cqw; color: #f8f3e8; }
  .enter .es { margin-top: 1.4cqw; font-size: 2.5cqw; font-weight: 300; letter-spacing: .4cqw; line-height: 1.7; color: rgba(243,238,226,.62); }

  /* — 頁尾 — */
  .foot { margin-top: 5.5cqw; text-align: center; font-size: 2.4cqw; font-weight: 300; letter-spacing: .5cqw; color: rgba(243,238,226,.6); }
  .foot .dot { color: var(--gold); margin: 0 1.4cqw; }
  .foot b { font-weight: 500; color: rgba(243,238,226,.85); }

  /* 列印為真 A4 */
  @page { size: A4 portrait; margin: 0; }
  @media print {
    body { padding: 0; background: #fff; }
    .sheet { width: 210mm; height: 297mm; box-shadow: none; aspect-ratio: auto; }
    .tip { display: none !important; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  .tip {
    position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%); z-index: 20;
    background: rgba(13,18,12,.92); color: var(--gold); border: 1px solid rgba(205,170,98,.35);
    font-size: 12px; letter-spacing: .5px; padding: 9px 14px; border-radius: 999px;
    display: flex; align-items: center; gap: 9px; box-shadow: 0 6px 24px rgba(0,0,0,.4);
  }
  .tip button { background: var(--gold); color: #10160f; border: 0; font-weight: 700; font-size: 12px; padding: 6px 12px; border-radius: 999px; cursor: pointer; letter-spacing: .5px; }
  .tip .x { opacity: .6; cursor: pointer; font-weight: 700; padding: 0 2px; }
</style>
</head>
<body>
  <div class="sheet">
    <div class="scrim"></div>

    <div class="content">
      <div class="head">
        <div class="kicker">鹿芝谷 · DEER VALLEY · 2026</div>
        <h1 class="title">蝶影</h1>
        <div class="sub">紫斑蝶攝影競賽</div>
        <div class="rule"></div>
        <div class="tag">拍下你眼中最美的紫色風景</div>
        <div class="meta">即日起 — 8/31<span class="dot">·</span>免費參與</div>
      </div>

      <div class="prizes">
        <div class="prize"><span class="nm">金獎<i>1 名</i></span><span class="am">NT$5,000</span></div>
        <div class="prize"><span class="nm">美感獎<i>2 名</i></span><span class="am">NT$2,000</span></div>
        <div class="prize"><span class="nm">人氣獎<i>1 名</i></span><span class="am">精美禮包</span></div>
      </div>

      <div class="enter">
        <div class="qbox"><img src="assets/qr.png" alt="掃碼前往報名上傳頁" /></div>
        <div>
          <div class="et">掃碼報名</div>
          <div class="es">填姓名・電話，上傳照片即完成</div>
        </div>
      </div>

      <div class="foot">現場打卡標註官方帳號送鑰匙圈<span class="dot">·</span>得獎公布 <b>2026 / 9 / 15</b></div>
    </div>
  </div>

  <div class="tip" id="tip">
    <span>可列印或存成 PDF（A4）</span>
    <button id="printBtn">列印 / 存 PDF</button>
    <span class="x" id="tipClose" aria-label="關閉">✕</span>
  </div>
  <script>
    document.getElementById("printBtn").addEventListener("click", () => window.print());
    document.getElementById("tipClose").addEventListener("click", () => document.getElementById("tip").style.display = "none");
  </script>
</body>
</html>
